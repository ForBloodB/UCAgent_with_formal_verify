schema_version: 2
case_id: "05_full_cache_coverage_closure"
title: "NutShell Cache declared functional coverage closure"
scope: "Executable closure for the 15 functional coverage points declared in this repository; not a full NutShell SoC or RTL line/toggle coverage claim."
owner_notes:
  - "This file is intentionally human-authored. UCAgent may extend or summarize it, but a human verifier owns final sign-off."
  - "A coverage point is counted as implemented only when it has a stimulus, checker/scoreboard, coverage bin, and evidence artifact."
  - "The PR21, PR74, and L2 readBurst bug points are included in this closure as first-class coverage evidence."

references:
  design_docs:
    - "NutShell-doc/功能部件/cache.md"
    - "NutShell-doc/系统/bus.md"
  source_files:
    - "src/main/scala/nutcore/mem/Cache.scala"
    - "src/main/scala/bus/simplebus/SimpleBus.scala"

roles:
  human:
    - "Define legal stimulus space and environment assumptions."
    - "Define scoreboard oracle and decide whether a protocol observation is a bug or an assumed contract."
    - "Review UCAgent-generated Toffee/formal drafts before accepting coverage closure."
  ucagent:
    - "Read this plan, run formal skill when requested, run official RunTestCases, and summarize coverage/bug candidates."
    - "Suggest possible bug classes from uncovered or high-risk points."
  picker:
    - "Export Chisel/Verilog Cache wrappers to Python DUT packages for the real NutShell cases."
  toffee:
    - "Drive directed/CRV-style sequences through executable pytest/Toffee flows and collect functional coverage."
  formal_skill:
    - "Run bounded protocol and corner-case assertions through generic-formal."
    - "Produce short counterexamples for narrow timing windows."

environment_assumptions:
  reset:
    description: "Reset is held long enough to clear wrapper state."
    owner: "human"
    status: "defined"
  simplebus_decoupled:
    description: "SimpleBusUC uses Decoupled req/resp handshakes."
    owner: "human"
    status: "defined"
  l1_resp_ready_policy:
    description: "05 checks standard Decoupled behavior. If NutShell requires L1 eager-ready, that must be documented as an environment contract."
    owner: "human"
    status: "defined_with_risk"
  memory_model:
    description: "Reference memory accepts requests with bounded latency and returns ordered burst responses."
    owner: "human"
    status: "defined"
  mmio_model:
    description: "MMIO accepts non-burst requests and returns one response per request."
    owner: "human"
    status: "defined"
  coherence_model:
    description: "The 05 closure uses a minimal probe-hit/probe-miss oracle sufficient for the declared coverage points."
    owner: "human"
    status: "defined_for_declared_scope"

bug_points:
  - id: "BUG_PR21_MMIO_PREFETCH_PIPELINE"
    title: "PR21 MMIO prefetch pipeline interference"
    classification:
      - "historical_real_bug"
      - "formal_detected"
      - "dynamic_reproduced"
      - "human_refined"
    mapped_coverage:
      - "CP_MMIO_PREFETCH_PIPELINE_INTERFERENCE"
    trigger: "An existing normal cache pipeline request reaches the later stage while an MMIO prefetch appears in the front stage."
    verification: "Real NutShell PR21 pre/fixed formal wrapper plus UCAgent/Toffee replay."
    evidence:
      - "reports/02_pr21.md"
      - "reports/02_pr21_ucagent_formal_skill.md"
      - "reports/02_pr21_toffee_coverage.md"
  - id: "BUG_PR74_CACHE_IO_IDBITS"
    title: "PR74 CacheIO idBits elaboration/interface regression"
    classification:
      - "historical_real_bug"
      - "formal_detected"
      - "human_refined"
    mapped_coverage:
      - "CP_CACHE_IO_IDBITS"
    trigger: "OOO-style Cache configuration requires request/response id fields, but pre-PR CacheIO omitted idBits."
    verification: "Real NutShell PR74 pre elaboration failure plus fixed response-ID regression."
    evidence:
      - "reports/03_pr74.md"
      - "reports/03_pr74_ucagent_formal_skill.md"
      - "reports/03_pr74_toffee_coverage.md"
  - id: "BUG_04_L2_READBURST_READY_VALID"
    title: "L2 readBurst hit ready/valid deadlock candidate"
    classification:
      - "UCAgent_suggested"
      - "human_refined"
      - "formal_detected"
      - "dynamic_reproduced"
    mapped_coverage:
      - "CP_READBURST_HIT_BACKPRESSURE"
      - "CP_READY_VALID_RESP_STABILITY"
    trigger: "Same-address readBurst miss/refill followed by readBurst hit while L1 resp_ready is low."
    verification: "Latest-upstream formal assert/cover plus public-IO dynamic replay and Toffee coverage."
    evidence:
      - "reports/04_l2_readburst.md"
      - "reports/04_l2_readburst_ucagent_full_demo.md"
      - "reports/04_l2_readburst_toffee_coverage.md"

coverage_points:
  - id: "CP_READ_HIT"
    group: "read"
    description: "CPU/L1 read hits an already valid clean line."
    stimulus: "05 reference cache model read after line fill."
    checker: "Scoreboard compares returned data with reference memory."
    target: "dynamic"
    status: "implemented"
    coverage_bin: "read.clean_hit"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_READ_MISS_REFILL"
    group: "read"
    description: "Read miss sends memory readBurst and refills a cache line."
    stimulus: "05 reference miss/refill sequence."
    checker: "Reference memory observes ordered burst refill and final readback."
    target: "dynamic"
    status: "implemented"
    coverage_bin: "read.miss_refill"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_READBURST_HIT_BACKPRESSURE"
    group: "readburst"
    description: "L2 readBurst hit while L1 resp.ready is low."
    stimulus: "Same-address readBurst miss/refill followed by hit with resp_ready=0."
    checker: "Ready/valid scoreboard and formal assertion."
    target: "formal_and_dynamic"
    status: "implemented"
    coverage_bin: "readburst.hit_backpressure"
    bug_point: "BUG_04_L2_READBURST_READY_VALID"
    evidence:
      - "reports/04_l2_readburst.md"
      - "reports/04_l2_readburst_toffee_coverage.md"

  - id: "CP_MMIO_PREFETCH_PIPELINE_INTERFERENCE"
    group: "mmio"
    description: "MMIO prefetch must not drop an existing normal cache pipeline request."
    stimulus: "PR21 historical replay."
    checker: "Pipeline preservation assertion and directed replay scoreboard."
    target: "formal_and_dynamic"
    status: "implemented"
    coverage_bin: "mmio.prefetch_pipeline_interference"
    bug_point: "BUG_PR21_MMIO_PREFETCH_PIPELINE"
    evidence:
      - "reports/02_pr21.md"
      - "reports/02_pr21_toffee_coverage.md"

  - id: "CP_CACHE_IO_IDBITS"
    group: "interface"
    description: "CacheIO with idBits must expose and preserve request/response id fields."
    stimulus: "PR74 historical fixed-DUT ID replay."
    checker: "Elaboration check and response ID scoreboard."
    target: "formal_and_dynamic"
    status: "implemented"
    coverage_bin: "interface.cache_io_idbits"
    bug_point: "BUG_PR74_CACHE_IO_IDBITS"
    evidence:
      - "reports/03_pr74.md"
      - "reports/03_pr74_toffee_coverage.md"

  - id: "CP_WRITE_HIT_FULL_MASK"
    group: "write"
    description: "Full-mask write hit updates one word and marks the line dirty."
    stimulus: "05 reference cache write to valid line with all byte lanes enabled."
    checker: "Byte-level scoreboard checks later readback and dirty state."
    target: "dynamic"
    status: "implemented"
    coverage_bin: "write.hit_full_mask"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_WRITE_HIT_PARTIAL_MASK"
    group: "write"
    description: "Partial-mask write hit merges bytes correctly."
    stimulus: "05 reference cache write with alternating byte mask."
    checker: "Byte-level reference model checks merged data."
    target: "dynamic"
    status: "implemented"
    coverage_bin: "write.hit_partial_mask"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_WRITE_MISS_REFILL"
    group: "write"
    description: "Write miss refills victim line and applies write data/mask correctly."
    stimulus: "05 reference write miss to absent line."
    checker: "Reference model checks refill data and final cache-visible data."
    target: "dynamic"
    status: "implemented"
    coverage_bin: "write.miss_refill"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_DIRTY_EVICTION_WRITEBACK"
    group: "replacement"
    description: "Dirty victim line is written back before replacement."
    stimulus: "05 reference conflict miss after dirtying a cached line."
    checker: "Memory monitor observes writeback before refill."
    target: "dynamic_or_formal"
    status: "implemented"
    coverage_bin: "replacement.dirty_evict_writeback"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_CLEAN_EVICTION_NO_WRITEBACK"
    group: "replacement"
    description: "Clean victim line does not issue writeback."
    stimulus: "05 reference conflict miss on a clean cached line."
    checker: "Memory monitor sees refill without dirty writeback."
    target: "dynamic"
    status: "implemented"
    coverage_bin: "replacement.clean_evict_no_writeback"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_FLUSH_DURING_OUTSTANDING_MISS"
    group: "flush"
    description: "Flush during outstanding miss must not produce stale CPU response."
    stimulus: "05 outstanding miss tracker receives flush before memory response."
    checker: "Outstanding tracker blocks stale response and records cancellation."
    target: "formal_and_dynamic"
    status: "implemented"
    coverage_bin: "flush.outstanding_miss"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_COHERENCE_PROBE_HIT"
    group: "coherence"
    description: "Probe to cached line returns probeHit/release data as required."
    stimulus: "05 minimal coherence oracle probes a valid dirty line."
    checker: "Coherence scoreboard checks hit response and data."
    target: "dynamic_or_formal"
    status: "implemented"
    coverage_bin: "coherence.probe_hit"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_COHERENCE_PROBE_MISS"
    group: "coherence"
    description: "Probe to absent line returns probeMiss and does not corrupt state."
    stimulus: "05 minimal coherence oracle probes an uncached address."
    checker: "Coherence scoreboard checks miss response and no data mutation."
    target: "dynamic_or_formal"
    status: "implemented"
    coverage_bin: "coherence.probe_miss"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_READY_VALID_REQ_STABILITY"
    group: "protocol"
    description: "Request bits remain stable while req.valid is high and req.ready is low."
    stimulus: "05 protocol monitor holds req.ready low for two cycles."
    checker: "Protocol monitor asserts stable req.bits."
    target: "formal_and_dynamic"
    status: "implemented"
    coverage_bin: "protocol.req_stability"
    evidence:
      - "reports/05_full_cache_coverage_plan.md"

  - id: "CP_READY_VALID_RESP_STABILITY"
    group: "protocol"
    description: "Response bits remain stable while resp.valid is high and resp.ready is low."
    stimulus: "05 protocol monitor plus 04 readBurst backpressure evidence."
    checker: "Protocol monitor asserts stable resp.bits; 04 checks valid generation under backpressure."
    target: "formal_and_dynamic"
    status: "implemented"
    coverage_bin: "protocol.resp_stability"
    bug_point: "BUG_04_L2_READBURST_READY_VALID"
    evidence:
      - "reports/04_l2_readburst.md"
      - "reports/05_full_cache_coverage_plan.md"

crv_scenarios:
  - id: "CRV_BASIC_READ_WRITE"
    description: "Randomized read/write single-beat accesses to cacheable memory."
    owner: "human_seeded_ucagent_extended"
    status: "implemented"
  - id: "CRV_MASK_STRESS"
    description: "Random byte masks and byte-level merge checks."
    owner: "human_seeded_ucagent_extended"
    status: "implemented"
  - id: "CRV_REPLACEMENT_STRESS"
    description: "Conflict addresses targeting the same set to force replacement."
    owner: "human_seeded_ucagent_extended"
    status: "implemented"
  - id: "CRV_BACKPRESSURE_STRESS"
    description: "Low-ready windows on CPU request/response paths."
    owner: "human_seeded_ucagent_extended"
    status: "implemented"
  - id: "CRV_FLUSH_STRESS"
    description: "Flush around outstanding transactions."
    owner: "human_seeded_ucagent_extended"
    status: "implemented"
  - id: "CRV_COHERENCE_STRESS"
    description: "Probe hit/miss checks with a minimal coherence oracle."
    owner: "human_seeded_ucagent_extended"
    status: "implemented"

scoreboard_plan:
  reference_memory:
    description: "Byte-addressable memory model with cache-line readBurst/writeBurst support."
    status: "implemented"
  outstanding_tracker:
    description: "Track accepted requests, response order, ids, user fields, and flush cancellation rules."
    status: "implemented"
  protocol_monitor:
    description: "Check Decoupled valid/ready stability and valid generation risk points."
    status: "implemented"
  cache_state_shadow:
    description: "Abstract cache state for replacement/dirty/coherence expected behavior in the declared 05 closure."
    status: "implemented"

coverage_database:
  format: "JSON summary plus Markdown reports; future UCIS merge may be added."
  scenario_reports:
    - "reports/02_pr21_toffee_coverage.md"
    - "reports/03_pr74_toffee_coverage.md"
    - "reports/04_l2_readburst_toffee_coverage.md"
    - "reports/05_full_cache_coverage_plan.md"
  target_report: "reports/05_full_cache_coverage_plan.md"
  bug_candidate_report: "reports/05_ucagent_bug_candidates.md"
  closure_policy:
    - "Implemented means status=implemented and all evidence files exist."
    - "A bug point is accepted only when linked to formal or dynamic evidence and reviewed by a human."
    - "05 coverage closure is scoped to these 15 functional points, not full RTL line/toggle coverage."
