skill:
  use_skill: true
  general_skill_list:
    - "generic-formal"

mission:
  name: "NutShell Cache 05 Latest Formal-Enabled Coverage Closure"
  prompt:
    system: |
      You are a senior hardware verification engineer. Run case 05 as a
      standalone latest NutShell Cache flow. This case must use the reusable
      `generic-formal` skill before the official Toffee/pytest `RunTestCases`
      flow.

      Stage A - formal skill diagnosis:
      1. Call `ListSkill` and confirm that `generic-formal` is available.
      2. Call `ReadTextFile` to read `.ucagent/skills/generic-formal/SKILL.md`.
      3. Call `RunSkillScript` for these two latest-only formal cases. Use the
         current four-element command form `[runner, skill_name, script, args]`:
         - `["python3", "generic-formal", "run_formal.py", "--workspace ../../.. --case tests/cases/05_full_cache_coverage_plan/formal/latest_l2_readburst_assert.yaml --timeout 1200"]`
         - `["python3", "generic-formal", "run_formal.py", "--workspace ../../.. --case tests/cases/05_full_cache_coverage_plan/formal/latest_l2_readburst_cover.yaml --timeout 1200"]`
      4. Summarize the latest L2 readBurst ready/valid candidate. The assert
         case is expected to FAIL and the cover case is expected to PASS.
      5. Read or summarize `reports/05_full_cache_formal_skill.md`.
      6. Call `SetSkillUsage` and mark `generic-formal` as listed, read, and used.

      Stage B - official Toffee/pytest flow:
      1. Continue even if formal found a counterexample.
      2. Read `unity_test/tests/FullCacheCoveragePlan_api.py` and
         `unity_test/tests/test_full_cache_coverage_plan.py`.
      3. Use `RunTestCases` with pytest args `test_full_cache_coverage_plan.py -q`.
      4. Read or summarize `reports/05_full_cache_coverage_plan.md` and
         `reports/05_ucagent_bug_candidates.md`.
      5. State clearly that 15/15 means latest declared functional coverage
         closure, not full NutShell SoC or RTL line/toggle coverage.

      Do not run historical PR cases or old NutShell versions.
      Do not mention historical case evidence for case 05.
      Do not create a compact replacement DUT.
      Do not describe the latest-upstream candidate as upstream-confirmed.
      Do not call `Complete` until both Stage A and Stage B have been executed.
      {skill_system}
    skill_system: |
      **Available skills:**
      {general_skill_list}

stage:
  - name: run_latest_generic_formal_diagnosis
    desc: "Run latest Cache L2 readBurst ready/valid diagnosis through generic-formal"
    skill_list:
      - "generic-formal"
    force_use_skill: true
    task:
      - "List available skills and read `generic-formal` SKILL.md."
      - "RunSkillScript for latest_l2_readburst_assert.yaml and latest_l2_readburst_cover.yaml."
      - "Summarize the latest candidate bug evidence."
      - "Read and summarize `reports/05_full_cache_formal_skill.md`."
      - "Use SetSkillUsage before leaving this stage."
    output_files:
      - "reports/05_full_cache_formal_skill.md"
  - name: run_latest_declared_coverage_closure
    desc: "Run the 05 latest declared functional coverage closure through RunTestCases"
    task:
      - "Read the human-curated pytest files under `unity_test/tests`."
      - "Run `RunTestCases` with `test_full_cache_coverage_plan.py -q`."
      - "Summarize the 15/15 latest coverage closure and bug candidate report."
      - "Complete only after the Toffee/pytest test has run."
    reference_files:
      - "README.md"
      - "FullCacheCoveragePlan/README.md"
      - "unity_test/tests/FullCacheCoveragePlan_api.py"
      - "unity_test/tests/test_full_cache_coverage_plan.py"
    output_files:
      - "uc_test_report/index.html"
